name: Playwright CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Select test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - api
          - ui
          - all

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run selected Playwright tests
  run: |
    if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
      if [ "${{ github.event.inputs.test_suite }}" = "smoke" ]; then
        npx playwright test --grep @smoke
      elif [ "${{ github.event.inputs.test_suite }}" = "regression" ]; then
        npx playwright test --grep @regression
      elif [ "${{ github.event.inputs.test_suite }}" = "api" ]; then
        npx playwright test --grep @api
      elif [ "${{ github.event.inputs.test_suite }}" = "ui" ]; then
        npx playwright test --grep @ui
      elif [ "${{ github.event.inputs.test_suite }}" = "all" ]; then
        npx playwright test
      fi
    else
      npx playwright test --grep @smoke
    fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/playwright-html-report
          retention-days: 7

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: reports/junit/results.xml
          retention-days: 7

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-results
          path: reports/json/results.json
          retention-days: 7